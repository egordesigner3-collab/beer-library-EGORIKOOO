<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MolagRUbal Brewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #ffffff;
      color: #000000;
      line-height: 1.3;
    }

    /* ===== HERO SECTION ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px 60px;
      text-align: center;
    }
    
    .hero-logo {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 40px;
      padding-bottom: 6px;
      border-bottom: 1px solid #000;
    }
    
    .hero-image {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 2px solid #000;
      object-fit: cover;
      margin-bottom: 30px;
      transition: transform 0.3s ease;
    }
    
    .hero-image:hover {
      transform: scale(1.05);
    }
    
    .hero-title {
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    
    .hero-subtitle {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 40px;
    }
    
    .scroll-btn {
      padding: 14px 32px;
      background: #000;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
      border: 1px solid #000;
    }
    
    .scroll-btn:hover {
      background: #fff;
      color: #000;
    }

    /* ===== LIBRARY SECTION ===== */
    .library {
      padding: 80px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .section-title {
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      border-left: 4px solid #000;
      padding-left: 16px;
    }
    
    .beer-counter {
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 16px;
      background: #000;
      color: #fff;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 40px;
      padding: 16px;
      border: 1px solid #000;
    }
    
    .controls input, .controls select {
      flex: 1 1 160px;
      padding: 12px 14px;
      border: 1px solid #000;
      background: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
    }
    
    .controls input:focus, .controls select:focus {
      outline: none;
      background: #000;
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #000;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    .card-img-wrapper {
      width: 100%;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 20px;
      flex-shrink: 0;
    }
    
    .card-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.3s;
    }
    
    .card:hover .card-img {
      transform: scale(1.05);
    }
    
    .card-body { 
      padding: 20px; 
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    
    .card-brand {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 12px;
    }
    
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    
    .tag {
      font-size: 0.7rem;
      padding: 4px 10px;
      border: 1px solid #000;
      font-weight: 600;
    }
    
    .tag.rating { background: #000; color: #fff; }
    
    .card-desc {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 16px;
      color: #444;
      flex-grow: 1;
    }
    
    .btn-tried {
      width: 100%;
      padding: 12px;
      border: 2px solid #000;
      background: transparent;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: auto;
      flex-shrink: 0;
    }
    
    .btn-tried:hover {
      background: #000;
      color: #fff;
    }
    
    .btn-tried.active {
      background: #000;
      color: #fff;
      animation: popIn 0.3s ease;
    }
    
    @keyframes popIn {
      0% { transform: scale(0.95); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* ===== МОБИЛЬНАЯ ВЕРСИЯ ===== */
    @media (max-width: 640px) {
      .hero-title { font-size: 2.2rem; }
      .hero-image { width: 160px; height: 160px; }
      .hero-subtitle { font-size: 0.7rem; }
      .scroll-btn { padding: 10px 24px; font-size: 0.75rem; }
      
      .section-header { flex-direction: column; align-items: flex-start; }
      .section-title { font-size: 1.5rem; }
      .beer-counter { font-size: 0.8rem; padding: 6px 12px; }
      
      .controls {
        padding: 10px;
        gap: 8px;
      }
      
      .controls input, .controls select {
        flex: 1 1 100%;
        padding: 10px 12px;
        font-size: 0.8rem;
      }
      
      .grid { grid-template-columns: 1fr; }
      
      .card-img-wrapper { height: 240px; padding: 15px; }
      .card-body { padding: 14px; }
      .card-title { font-size: 1rem; }
      .card-brand { font-size: 0.75rem; }
      .card-desc { font-size: 0.85rem; }
      .btn-tried { padding: 10px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-logo">MolagRUbal Brewer</div>
    
    <img 
      src="img/logo.png"

    <h1 class="hero-title">Welcome To The Beerdom</h1>

    <div class="grid" id="grid"></div>
  </section>

      { id: 44, name: "Saldens Weissbier", brand: "Saldens", country: "Россия", style: "Хефевайцен", abv: 6.0, rating: 1, repeat: false, img: "img/44.Saldens_Weissbier.jpg", taste: "Вкус пива с тонами пшеницы, нотками гвоздики и банана и заметной хмелевой горечью.", where: "Специализированные пивные магазины" },
      { id: 45, name: "Шлоссбахер ХефеВайзен", brand: "Schlossbacher", country: "Германия", style: "Хефевайцен", abv: 5.4, rating: 5, repeat: true, img: "img/45.Schlossbacher_KhefeVaizen.jpg", taste: "Вкус свежий, мягкий, с насыщенными пшеничными тонами и фруктово-дрожжевыми нотками в послевкусии. Также в финале угадывается и характерная пряность.", where: "Специализированные пивные магазины, О'кей" }
    ];

    // ПРИКОЛЬНЫЕ ФРАЗЫ ДЛЯ КНОПКИ
    const funnyPhrases = [
      "Вот это ты молодец! 🍺",
      "Красавчик! Так держать! 💪",
      "Пиво одобрено! ✅",
      "Уважаемый дегустатор! 🧐",
      "Мастер пива! 🏆",
      "Зачёт, братан! 🤝",
      "Принято! Налей ещё! 🍻",
      "Вкуснятина! 🤤",
      "Ты знаешь толк! 👌",
      "Одобрено экспертом! 🎓",
      "Пробовал и не жалеешь! 😎",
      "Это был правильный выбор! ✨",
      "Пивной сомелье! 🍷",
      "Так держать, чемпион! 🥇",
      "Вкуснятина подтверждена! 📋"
    ];

    // ЛОГИКА
    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search');
    const fCountry = document.getElementById('f-country');
    const fStyle = document.getElementById('f-style');
    const fRating = document.getElementById('f-rating');
    const beerCounter = document.getElementById('beerCounter');

    // Обновляем счётчик
    beerCounter.textContent = `Всего пивасов: ${beers.length}`;

    // Заполняем фильтры
    const countries = [...new Set(beers.map(b => b.country))].sort();
    const styles = [...new Set(beers.map(b => b.style))].sort();
    const ratings = [...new Set(beers.map(b => b.rating))].sort((a, b) => b - a);

    countries.forEach(c => fCountry.innerHTML += '<option value="' + c + '">' + c + '</option>');
    styles.forEach(s => fStyle.innerHTML += '<option value="' + s + '">' + s + '</option>');
    ratings.forEach(r => fRating.innerHTML += '<option value="' + r + '">' + r + '/5</option>');

    function render() {
      grid.innerHTML = '';
      const q = searchInput.value.toLowerCase().trim();
      const c = fCountry.value;
      const s = fStyle.value;
      const r = fRating.value;

      const filtered = beers.filter(b => {
        const matchQ = !q || b.name.toLowerCase().includes(q) || b.brand.toLowerCase().includes(q);
        const matchC = !c || b.country === c;
        const matchS = !s || b.style === s;
        const matchR = !r || b.rating >= parseInt(r);
        return matchQ && matchC && matchS && matchR;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">Ничего не найдено</div>';
        return;
      }

      filtered.forEach(b => {
        const tried = localStorage.getItem('beer_' + b.id) === 'true';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = 
          '<div class="card-img-wrapper">' +
            '<img src="' + b.img + '" class="card-img" alt="' + b.name + '" loading="lazy" onerror="this.src=\'https://via.placeholder.com/400x400?text=Нет+фото\'">' +
          '</div>' +
          '<div class="card-body">' +
            '<div class="card-title">' + b.name + '</div>' +
            '<div class="card-brand">' + b.brand + ' • ' + b.abv + '%</div>' +
            '<div class="tags">' +
              '<span class="tag rating">' + b.rating + '/5</span>' +
              '<span class="tag">' + b.style + '</span>' +
              (b.repeat ? '<span class="tag">Повторить</span>' : '') +
            '</div>' +
            '<div class="card-desc"><b>Где:</b> ' + b.where + '<br><b>Вкус:</b> ' + b.taste + '</div>' +
            '<button class="btn-tried ' + (tried ? 'active' : '') + '" data-id="' + b.id + '">' +
              (tried ? funnyPhrases[Math.floor(Math.random() * funnyPhrases.length)] : 'Пробовал?') +
            '</button>' +
          '</div>';
        grid.appendChild(card);
      });

      // Кнопки "Пробовал" с автосбросом
      document.querySelectorAll('.btn-tried').forEach(btn => {
        btn.addEventListener('click', function() {
          const id = this.getAttribute('data-id');
          const current = localStorage.getItem('beer_' + id) === 'true';
          
          if (!current) {
            localStorage.setItem('beer_' + id, 'true');
            const randomPhrase = funnyPhrases[Math.floor(Math.random() * funnyPhrases.length)];
            this.textContent = randomPhrase;
            this.classList.add('active');
            
            setTimeout(() => {
              localStorage.setItem('beer_' + id, 'false');
              render();
            }, 3000);
          } else {
            localStorage.setItem('beer_' + id, 'false');
            render();
          }
        });
      });
    }

    // Слушатели
    searchInput.addEventListener('input', render);
    fCountry.addEventListener('change', render);
    fStyle.addEventListener('change', render);
    fRating.addEventListener('change', render);

    // Первый запуск
    render();
  </script>
